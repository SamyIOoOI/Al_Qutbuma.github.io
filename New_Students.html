<!DOCTYPE html>
<html>
    <head>
        <title>Student Applications</title>
        <style>
            body{
            background-color: firebrick;
            font-weight: bold;
            margin: 0;
            h1{
                text-align: center;
            }
        
        }
        </style>
    </head>
    <body style="color: white; opacity: 5; font-family:cursive; font-size: larger; text-align: center;">
        <h1>Sign Up</h1>
        <form method="post" style="background-color: rgb(105, 4, 4); display: inline-block; padding: 18px; border-radius: 5px; text-align: center;">
            <label for="username" class='formstyle'">Name</label>
            <input id="username" name="user" type="text" required><br><br>
            <label for="tel" class='formstyle'>Phone Number</label>
            <input id="tel" name="Phone Number" type="text" required><br><br>
            <label for='email' class='formstyle'>Email Address</label>
            <input id='email' name='Email Address' type="email" required><br><br>
            <button type="submit">Submit</button>

        </form>
    </body>
</html>
